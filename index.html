<script type="text/javascript">
    var elems = document.getElementsByClassName("dynamic");
    var trampInput = document.createElement("input");
    var istdselect = false;
    trampInput.type = "text";
    trampInput.className = "trampInput";

    // Обработчик потери фокуса - конвертируем буквы обратно в картинки
    trampInput.addEventListener("blur", function() {
        let text = trampInput.value;
        let html = text;
        
        // Конвертируем буквы обратно в картинки
        html = html.replace(/Л/gi, '<img src="rook.png" alt="Ладья">');
        html = html.replace(/С/gi, '<img src="bishop.png" alt="Слон">');
        html = html.replace(/К/gi, '<img src="king.png" alt="Король">');
        html = html.replace(/Ф/gi, '<img src="queen.png" alt="Ферзь">');
        
        trampInput.parentNode.innerHTML = html;
        istdselect = false;
    }, false);

    for (var i = 0; i < elems.length; i++) {
        var el = elems[i];

        el.addEventListener("click", function() {
            if (istdselect) return;
            istdselect = true;

            let innerHTML = this.innerHTML;

            // Заменяем картинки на буквы
            innerHTML = innerHTML.replace(/<img[^>]*src=["']rook\.png["'][^>]*>/gi, "Л");
            innerHTML = innerHTML.replace(/<img[^>]*src=["']bishop\.png["'][^>]*>/gi, "С");
            innerHTML = innerHTML.replace(/<img[^>]*src=["']king\.png["'][^>]*>/gi, "К");
            innerHTML = innerHTML.replace(/<img[^>]*src=["']queen\.png["'][^>]*>/gi, "Ф");

            // Удаляем все пробелы и переносы строк
            innerHTML = innerHTML.replace(/\s+/g, '');

            this.innerHTML = "";
            trampInput.value = innerHTML;
            this.appendChild(trampInput);

            trampInput.focus();
            trampInput.select();

        }.bind(el), false);
    }
</script>
